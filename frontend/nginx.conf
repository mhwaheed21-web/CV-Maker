server {
    listen 80;

    location / {
        root   /usr/share/nginx/html;
        index  index.html;
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        proxy_pass         https://cvmaker-backend.internal.ashycoast-6e27a9dc.southeastasia.azurecontainerapps.io;
        proxy_ssl_server_name on;
        proxy_set_header   Host cvmaker-backend.internal.ashycoast-6e27a9dc.southeastasia.azurecontainerapps.io;
        proxy_set_header   X-Real-IP $remote_addr;
    }
}
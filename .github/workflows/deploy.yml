name: Deploy to Azure Container Apps

on:
  push:
    branches:
      - master

permissions:
  id-token: write
  contents: read

env:
  AZURE_RESOURCE_GROUP: cvmaker-rg
  ACR_LOGIN_SERVER: cvmakeracr12072.azurecr.io
  BACKEND_APP_NAME: cvmaker-backend
  FRONTEND_APP_NAME: cvmaker-frontend

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: cvmaker_user
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: cvmaker
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U cvmaker_user -d cvmaker"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
      
      - name: Run database migrations
        env:
          DATABASE_URL: postgresql+asyncpg://cvmaker_user:test_password@localhost:5432/cvmaker
          SECRET_KEY: test-jwt-secret-key
          OPENAI_API_KEY: sk-test-placeholder
          ENVIRONMENT: test
        run: |
          cd backend
          alembic upgrade head

      - name: Run tests
        env:
          DB_USER: cvmaker_user
          DB_PASSWORD: test_password
          DB_NAME: cvmaker
          DATABASE_URL: postgresql+asyncpg://cvmaker_user:test_password@localhost:5432/cvmaker
          SECRET_KEY: test-jwt-secret-key
          OPENAI_API_KEY: sk-test-placeholder
          ENVIRONMENT: test
        run: |
          cd backend
          pytest tests/ -v

  build_and_deploy:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure login via OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Log in to ACR
        run: az acr login --name cvmakeracr12072

      - name: Build and push backend image
        run: |
          docker build -t $ACR_LOGIN_SERVER/backend:${GITHUB_SHA} ./backend
          docker push $ACR_LOGIN_SERVER/backend:${GITHUB_SHA}

      - name: Build and push frontend image
        run: |
          docker build -t $ACR_LOGIN_SERVER/frontend:${GITHUB_SHA} ./frontend
          docker push $ACR_LOGIN_SERVER/frontend:${GITHUB_SHA}

      - name: Deploy backend revision
        run: |
          az containerapp registry set \
            --name $BACKEND_APP_NAME \
            --resource-group $AZURE_RESOURCE_GROUP \
            --server $ACR_LOGIN_SERVER \
            --username ${{ secrets.ACR_USERNAME }} \
            --password ${{ secrets.ACR_PASSWORD }}
          az containerapp update \
            --name $BACKEND_APP_NAME \
            --resource-group $AZURE_RESOURCE_GROUP \
            --image $ACR_LOGIN_SERVER/backend:${GITHUB_SHA}

      - name: Deploy frontend revision
        run: |
          az containerapp registry set \
            --name $FRONTEND_APP_NAME \
            --resource-group $AZURE_RESOURCE_GROUP \
            --server $ACR_LOGIN_SERVER \
            --username ${{ secrets.ACR_USERNAME }} \
            --password ${{ secrets.ACR_PASSWORD }}
          az containerapp update \
            --name $FRONTEND_APP_NAME \
            --resource-group $AZURE_RESOURCE_GROUP \
            --image $ACR_LOGIN_SERVER/frontend:${GITHUB_SHA}

  smoke_test:
    runs-on: ubuntu-latest
    needs: build_and_deploy
    steps:
      - name: Smoke test root endpoint
        run: curl -fsS https://cvmaker-frontend.ashycoast-6e27a9dc.southeastasia.azurecontainerapps.io/ > /dev/null

      - name: Smoke test API route
        run: curl -fsS https://cvmaker-frontend.ashycoast-6e27a9dc.southeastasia.azurecontainerapps.io/api/v1/templates/ > /dev/null
